<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Badger Game</title><link rel="stylesheet" href="styles.css"></head><body><div class="container"><div class="card top"><h1 class="title">The Badger Game 🦡</h1><div class="timer" id="timer">Production in 60s</div><div class="buttons"><button id="open-btn">Open</button> <button id="save-btn">Save</button> <span style="width: 10px;"></span> <button title="Normal speed" id="speed-1">▶</button> <button title="Fast speed" id="speed-2">▶▶</button> <button title="Fastest speed" id="speed-3">▶▶▶</button></div></div><div class="middle"><div class="card left"><div class="grid" id="grid"></div></div><div class="card right"><h2>Continent Information</h2><p>Population: <span id="pop">0</span></p><p>Happiness: <span id="hap">0</span></p><p>Work Places: <span id="work">0</span></p><p style="margin-bottom: 6px;">Badgercoins: <span id="coins">0</span></p><p>Metals: <span id="metal">0</span></p><p>Badger skin: <span id="skin">0</span></p><p style="margin-bottom: 6px;">Electronics: <span id="elec">0</span></p><p>Power: <span id="pow">0 / 0</span></p><p>Water: <span id="water">0 / 0</span></p><p>Food: <span id="food">0 / 0</span></p></div></div><div class="card bottom"><div class="shop-tabs"><button class="tab active" data-tab="life">Life Support</button> <button class="tab" data-tab="production">Production</button> <button class="tab" data-tab="housing">Housing</button> <button class="tab" data-tab="workfun">Work & Fun</button></div><div class="shop-content"><div class="placement-msg hidden" id="placement-msg">Press ESC to cancel placement</div><div class="items-container" id="items-container"></div></div></div></div><div id="save-dialog" class="popup hidden"><div class="popup-content"><h3>Save World</h3><input type="text" id="world-name" placeholder="World name"><div class="popup-buttons"><button id="cancel-save">Cancel</button> <button id="confirm-save">Save</button></div></div></div><div id="open-dialog" class="popup hidden"><div class="popup-content"><h3>Open World</h3><select id="open-select"></select><div class="popup-buttons"><button id="cancel-open">Cancel</button> <button id="confirm-open">Open</button></div></div></div><script src="game.js"></script></body></html>
